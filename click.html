<!DOCTYPE html>
<html>
<head>
<title>Clicker</title>
</head>
<body style="background-color:black;">

<button id="bttn" style="width:100%;height:100px;font-size:80px;font-family:monospace;border:0px solid black">click to start</button>

<script>

var clicks = 0
const bttn = document.getElementById("bttn")

var colours = Array("#ff0000","#ff9b00","#ffff00","#00ff00","#00ffff","#0000ff","#ff00ff")

bttn.onclick = function() {
    clicks += 1
    bttn.innerHTML = "clicks: "+clicks
    bttn.style.backgroundColor = colours[Math.floor(Math.random()*colours.length)]
}

</script>

</body>
</html>
